<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Quizzes – AjiQuiz</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand"><span class="brand-icon">⬡</span><span class="brand-name">AjiQuiz</span></div>
    <div class="nav-links">
      <span id="student-greeting" class="text-muted" style="font-size:0.875rem"></span>
      <button class="btn btn-ghost" id="logout-btn">Sign Out</button>
    </div>
  </nav>

  <div style="max-width:960px;margin:0 auto;padding:2.5rem 1.5rem;">
    <div style="margin-bottom:2rem;">
      <h1 style="font-family:var(--font-display);font-size:1.6rem;font-weight:700;">Available Quizzes</h1>
      <p class="text-muted">Pick a quiz to get started. Results are submitted immediately after completion.</p>
    </div>

    <div id="quiz-list" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.25rem;"></div>
    <div id="quiz-empty" class="empty-state hidden">
      <div class="empty-icon">📋</div>
      <p>No quizzes are available right now. Check back later!</p>
    </div>

    <hr class="divider" style="margin:2.5rem 0;"/>

    <div>
      <h2 style="font-family:var(--font-display);font-size:1.2rem;font-weight:700;margin-bottom:1rem;">My Past Results</h2>
      <div id="my-results"></div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script>
    const Q = AjiQuiz;
    const student = Q.auth.getStudent();
    if (!student) window.location.href = 'login.html';

    document.getElementById('student-greeting').textContent = `Hello, ${student.name}`;
    document.getElementById('logout-btn').addEventListener('click', () => {
      Q.auth.logoutStudent();
      window.location.href = 'login.html';
    });

    function render() {
      const published = Q.quizzes.getPublished();
      const myResults = Q.results.getByStudent(student.id);

      if (published.length === 0) {
        document.getElementById('quiz-list').innerHTML = '';
        document.getElementById('quiz-empty').classList.remove('hidden');
      } else {
        document.getElementById('quiz-empty').classList.add('hidden');
        document.getElementById('quiz-list').innerHTML = published.map(q => {
          const attempted = Q.results.hasAttempted(student.id, q.id);
          const myResult = myResults.find(r => r.quizId === q.id);
          return `
            <div class="card" style="display:flex;flex-direction:column;gap:1rem;">
              <div>
                <div class="flex items-center justify-between mb-1">
                  <span class="badge badge-blue" style="font-size:0.7rem;">${q.subject || 'General'}</span>
                  ${attempted ? '<span class="badge badge-green">✓ Done</span>' : ''}
                </div>
                <h3 style="font-family:var(--font-display);font-weight:700;font-size:1rem;margin-bottom:0.4rem;">${q.title}</h3>
                <p class="text-muted" style="font-size:0.82rem;">${q.questions.length} questions · ${q.duration} minutes</p>
              </div>
              ${myResult ? `
                <div style="background:var(--indigo-900);border-radius:6px;padding:0.75rem;font-size:0.82rem;">
                  Score: <strong class="text-volt">${myResult.score}/${myResult.total} (${myResult.percentage}%)</strong>
                  — <span class="badge ${Q.scoreGrade(myResult.percentage).cls}">${Q.scoreGrade(myResult.percentage).label}</span>
                </div>
              ` : ''}
              <button class="btn ${attempted ? 'btn-secondary' : 'btn-primary'} btn-block"
                onclick="startQuiz('${q.id}')" ${attempted ? 'disabled' : ''}>
                ${attempted ? 'Already Submitted' : 'Start Quiz →'}
              </button>
            </div>
          `;
        }).join('');
      }

      // Past results
      if (myResults.length === 0) {
        document.getElementById('my-results').innerHTML = '<p class="text-muted" style="font-size:0.875rem">No results yet.</p>';
      } else {
        document.getElementById('my-results').innerHTML = `
          <table class="data-table">
            <thead><tr><th>Quiz</th><th>Score</th><th>Grade</th><th>Date</th></tr></thead>
            <tbody>
              ${myResults.slice().reverse().map(r => {
                const quiz = Q.quizzes.getById(r.quizId);
                const g = Q.scoreGrade(r.percentage);
                return `<tr>
                  <td>${quiz ? quiz.title : '—'}</td>
                  <td>${r.score} / ${r.total} (${r.percentage}%)</td>
                  <td><span class="badge ${g.cls}">${g.label}</span></td>
                  <td>${Q.formatDate(r.timestamp)}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        `;
      }
    }

    function startQuiz(quizId) {
      Q.store.set('active_quiz_id', quizId);
      window.location.href = 'quiz.html';
    }

    render();
  </script>
</body>
</html>

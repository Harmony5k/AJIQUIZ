<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Results – AjiQuiz</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand"><span class="brand-icon">⬡</span><span class="brand-name">AjiQuiz</span></div>
    <div class="nav-links">
      <a href="student-dashboard.html" class="btn btn-ghost">← Back to Dashboard</a>
    </div>
  </nav>

  <div class="quiz-layout">
    <div id="results-content"></div>
  </div>

  <script src="../js/app.js"></script>
  <script>
    const Q = AjiQuiz;
    const student = Q.auth.getStudent();
    if (!student) window.location.href = 'login.html';

    const result = Q.store.get('last_result');
    if (!result) window.location.href = 'student-dashboard.html';

    const quiz = Q.quizzes.getById(result.quizId);
    const grade = Q.scoreGrade(result.percentage);

    // Build score circle gradient
    const deg = Math.round((result.percentage / 100) * 360);
    const circleStyle = `conic-gradient(var(--volt) ${deg}deg, rgba(170,255,0,0.12) ${deg}deg)`;

    const gradeMessages = {
      'Excellent':      '🏆 Outstanding performance! Keep it up!',
      'Good':           '👍 Great work! A little more and you\'ll ace it.',
      'Average':        '📘 Decent effort. Review missed questions to improve.',
      'Below Average':  '💪 Don\'t give up! Study and try harder next time.',
    };

    let reviewHTML = quiz ? quiz.questions.map((q, i) => {
      const selected = result.answers[i];
      const correct  = q.answer;
      const isRight  = selected === correct;
      return `
        <div style="margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid rgba(255,255,255,0.07);">
          <p style="font-weight:600;margin-bottom:0.6rem;font-size:0.92rem;">
            <span class="${isRight ? 'text-success' : 'text-error'}">${isRight ? '✓' : '✗'}</span>
            Q${i+1}. ${q.question}
          </p>
          <div style="display:flex;flex-direction:column;gap:0.3rem;">
            ${q.options.map(opt => {
              let color = 'var(--slate-400)';
              let prefix = '○';
              if (opt.key === correct) { color = 'var(--success)'; prefix = '✓'; }
              if (opt.key === selected && !isRight) { color = 'var(--error)'; prefix = '✗'; }
              return `<span style="font-size:0.82rem;color:${color}">${prefix} ${opt.key}. ${opt.text}</span>`;
            }).join('')}
          </div>
          ${!isRight && selected ? `<p style="font-size:0.78rem;color:var(--slate-400);margin-top:0.4rem">Your answer: <strong style="color:var(--error)">${selected}</strong> · Correct: <strong style="color:var(--success)">${correct}</strong></p>` : ''}
          ${!selected ? `<p style="font-size:0.78rem;color:var(--slate-400);margin-top:0.4rem">Not answered · Correct: <strong style="color:var(--success)">${correct}</strong></p>` : ''}
        </div>
      `;
    }).join('') : '';

    document.getElementById('results-content').innerHTML = `
      <div class="results-card">
        <div class="score-circle" style="background:${circleStyle}">
          <div class="score-inner">
            <span class="score-pct">${result.percentage}%</span>
            <span class="score-label">SCORE</span>
          </div>
        </div>
        ${result.timedOut ? '<p class="badge badge-red" style="margin:0 auto 0.75rem">⏱ Time Expired</p>' : ''}
        <h2 class="results-title">${grade.label}!</h2>
        <p class="text-muted">${gradeMessages[grade.label]}</p>
        <div class="stats-row">
          <div class="stat-box">
            <div class="stat-val text-success">${result.score}</div>
            <div class="stat-key">Correct</div>
          </div>
          <div class="stat-box">
            <div class="stat-val text-error">${result.total - result.score}</div>
            <div class="stat-key">Wrong</div>
          </div>
          <div class="stat-box">
            <div class="stat-val">${result.total}</div>
            <div class="stat-key">Total</div>
          </div>
        </div>
      </div>

      ${quiz ? `
      <div class="card">
        <div class="card-header">
          <span class="card-title">Answer Review – ${quiz.title}</span>
        </div>
        ${reviewHTML}
      </div>
      ` : ''}

      <div style="text-align:center;margin-top:1.5rem;">
        <a href="student-dashboard.html" class="btn btn-primary btn-lg">← Back to Dashboard</a>
      </div>
    `;
  </script>
</body>
</html>
